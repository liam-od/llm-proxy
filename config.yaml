model_list:
  - model_name: mini
    litellm_params:
      model: github_copilot/gpt-4o-mini
  - model_name: haiku
    litellm_params:
      model: claude-code/haiku
  - model_name: sonnet
    litellm_params:
      model: claude-code/sonnet
  - model_name: opus
    litellm_params:
      model: claude-code/opus

  # Pensieve inference — Modal-hosted vLLM over HTTP, plus the RPC embedder.
  # URLs aren't secret; the bearer (VLLM_API_KEY) + Modal tokens are env-only.
  - model_name: modal-llm
    litellm_params:
      model: openai/llm
      api_base: https://liamgregoryod--pensieve-llm.us-east.modal.direct/v1
      api_key: os.environ/VLLM_API_KEY
  - model_name: modal-transcribe
    litellm_params:
      model: openai/transcribe
      api_base: https://liamgregoryod--pensieve-transcribe.us-east.modal.direct/v1
      api_key: os.environ/VLLM_API_KEY
    model_info:
      mode: audio_transcription
  - model_name: modal-embed
    litellm_params:
      model: modal/embed
    model_info:
      mode: embedding

litellm_settings:
  # Modal Flash containers 503 while cold; retry a few times and allow a slow
  # snapshot restore to finish rather than timing the request out.
  num_retries: 3
  request_timeout: 600
  custom_provider_map:
    - { "provider": "claude-code", "custom_handler": handlers.claude.claude_code }
    - { "provider": "modal", "custom_handler": handlers.modal_embed.modal_embedder }
